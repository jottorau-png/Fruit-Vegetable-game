<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>마트 분류 놀이</title>
<style>
  :root{
    --bg1:#FFF6EC;
    --bg2:#FDEFE2;
    --pink:#FFD9E3;
    --pink-dark:#FF9FB6;
    --green:#D9F2D9;
    --green-dark:#7FCB7F;
    --blue:#DDEEFB;
    --blue-dark:#8FC4EC;
    --yellow:#FFF3C4;
    --yellow-dark:#FFD56B;
    --text:#5A4A42;
    --shadow: rgba(150,120,90,0.18);
    --radius: 28px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    width:100%;height:100%;
    font-family:'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);
    overflow-x:hidden;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  #app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 14px 40px;
  }

  /* ---------- 상단 헤더 ---------- */
  .header{
    width:100%;
    max-width:920px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
  }
  .stage-badge{
    background:#fff;
    border-radius:999px;
    padding:10px 22px;
    font-size:1.3rem;
    font-weight:800;
    box-shadow:0 6px 0 var(--shadow);
    color:var(--pink-dark);
    border:3px solid var(--pink-dark);
    white-space:nowrap;
  }
  .progress-dots{
    display:flex;
    gap:10px;
  }
  .dot{
    width:22px;height:22px;border-radius:50%;
    background:#fff;
    border:3px solid #e8d8c8;
    display:flex;align-items:center;justify-content:center;
    font-size:0.9rem;
    cursor:pointer;
    transition: transform .12s;
  }
  .dot:hover{
    transform:scale(1.15);
  }
  .dot.active{
    background:var(--yellow-dark);
    border-color:var(--yellow-dark);
  }
  .dot.done{
    background:var(--green-dark);
    border-color:var(--green-dark);
    color:#fff;
  }

  /* ---------- 중앙 게임 영역 ---------- */
  .game-card{
    width:100%;
    max-width:920px;
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 14px 0 var(--shadow);
    padding:28px 22px 26px;
    position:relative;
    min-height:480px;
    display:flex;
    flex-direction:column;
  }

  .mission{
    text-align:center;
    font-size:1.6rem;
    font-weight:800;
    margin-bottom:6px;
    line-height:1.4;
  }
  .sub-mission{
    text-align:center;
    font-size:1.05rem;
    color:#8a7a6e;
    margin-bottom:18px;
  }

  /* ---------- 시작 화면 ---------- */
  .intro-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    text-align:center;
  }
  .intro-emoji{
    font-size:5.5rem;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-14px);}
  }
  .intro-title{
    font-size:2.1rem;
    font-weight:900;
    color:var(--pink-dark);
  }
  .intro-desc{
    font-size:1.15rem;
    color:#7a6a5e;
    max-width:560px;
  }
  .start-btn{
    margin-top:10px;
    font-size:1.4rem;
    font-weight:800;
    padding:18px 50px;
    border-radius:999px;
    border:none;
    background:linear-gradient(145deg,var(--yellow-dark),#FFB84D);
    color:#5a3e10;
    box-shadow:0 8px 0 #d99a2e;
    cursor:pointer;
    transition:transform .08s;
  }
  .start-btn:active{
    transform:translateY(6px);
    box-shadow:0 2px 0 #d99a2e;
  }

  /* ---------- 단계 선택 화면 ---------- */
  .stage-select-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
    width:100%;
    max-width:760px;
    margin-top:6px;
  }
  .stage-select-card{
    background:var(--bg1);
    border:4px solid #f0e2d2;
    border-radius:24px;
    padding:22px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    transition: all .15s;
    min-height:150px;
  }
  .stage-select-card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 0 var(--shadow);
    border-color:var(--pink-dark);
    background:var(--pink);
  }
  .stage-select-card:active{
    transform:translateY(-2px);
  }
  .stage-select-emoji{
    font-size:2.6rem;
    line-height:1;
  }
  .stage-select-title{
    font-size:1.15rem;
    font-weight:900;
    color:var(--pink-dark);
  }
  .stage-select-desc{
    font-size:0.95rem;
    color:#7a6a5e;
    text-align:center;
    line-height:1.3;
  }

  /* ---------- 1단계: 드롭존 ---------- */
  .stage1-area{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    flex:1;
    justify-content:center;
  }
  .current-item-zone{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:160px;
  }
  .current-item{
    width:140px;height:140px;
    background:var(--yellow);
    border-radius:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:5rem;
    box-shadow:0 8px 0 var(--shadow);
    cursor:grab;
    touch-action:none;
    border:4px solid #fff;
    transition: transform .12s, box-shadow .12s;
    position:relative;
    z-index:5;
  }
  .current-item.dragging{
    cursor:grabbing;
    transform:scale(1.08);
    box-shadow:0 16px 24px rgba(0,0,0,0.18);
  }
  .current-item.popped{
    animation:popOut .35s ease forwards;
  }
  @keyframes popOut{
    0%{transform:scale(1);opacity:1;}
    100%{transform:scale(0.3);opacity:0;}
  }
  .boxes-row{
    display:flex;
    gap:24px;
    width:100%;
    justify-content:center;
    flex-wrap:wrap;
  }
  .drop-box{
    width:260px;
    min-height:170px;
    border-radius:26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-size:1.2rem;
    font-weight:800;
    border:4px dashed transparent;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    padding:14px;
  }
  .drop-box .box-emoji{font-size:3rem;}
  .drop-box.food{
    background:var(--green);
    color:#3c7a3c;
    border-color:var(--green-dark);
  }
  .drop-box.object{
    background:var(--blue);
    color:#3a6f95;
    border-color:var(--blue-dark);
  }
  .drop-box.hover-active{
    transform:scale(1.05);
    box-shadow:0 10px 22px rgba(0,0,0,0.15);
  }
  .drop-box.wrong-shake{
    animation:shake .4s;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    75%{transform:translateX(10px);}
  }

  .item-counter{
    font-size:1.05rem;
    color:#9a8a7e;
    font-weight:700;
  }

  /* ---------- 2단계: 카드 선택 ---------- */
  .cards-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    flex:1;
    align-content:center;
  }
  .pick-card{
    background:var(--bg1);
    border:4px solid #f0e2d2;
    border-radius:24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:22px 8px;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
    transition: all .15s;
    min-height:140px;
  }
  .pick-card .card-emoji{font-size:3.6rem;}
  .pick-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 0 var(--shadow);
  }
  .pick-card.selected{
    background:var(--yellow);
    border-color:var(--yellow-dark);
    transform:translateY(-4px);
    box-shadow:0 10px 0 #e0bb55;
  }
  .pick-card.correct-flash{
    background:var(--green);
    border-color:var(--green-dark);
  }
  .pick-card.wrong-flash{
    background:#FFE0E0;
    border-color:#FF9F9F;
    animation:shake .4s;
  }
  .pick-card.locked{
    cursor:default;
  }
  .check-btn{
    margin-top:18px;
    align-self:center;
    font-size:1.25rem;
    font-weight:800;
    padding:14px 42px;
    border-radius:999px;
    border:none;
    background:linear-gradient(145deg,var(--green-dark),#5fb35f);
    color:#fff;
    box-shadow:0 6px 0 #3f8a3f;
    cursor:pointer;
  }
  .check-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #3f8a3f;}
  .check-btn:disabled{
    opacity:0.5;
    cursor:default;
  }

  /* ---------- 3단계: 바구니 담기 ---------- */
  .stage3-wrap{
    display:flex;
    flex-direction:column;
    flex:1;
    gap:14px;
  }
  .fruit-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
  }
  .fruit-card{
    background:#fff;
    border:4px solid #f0e2d2;
    border-radius:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:16px 4px;
    font-size:0.95rem;
    font-weight:700;
    cursor:pointer;
    transition: all .15s;
    min-height:110px;
  }
  .fruit-card .fruit-emoji{font-size:2.8rem;}
  .fruit-card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 0 var(--shadow);
  }
  .fruit-card.in-basket{
    opacity:0.35;
    cursor:default;
    transform:none;
  }
  .basket-zone{
    margin-top:auto;
    background:var(--pink);
    border-radius:24px;
    padding:16px 18px;
    display:flex;
    align-items:center;
    gap:14px;
    min-height:110px;
    border:4px solid var(--pink-dark);
  }
  .basket-icon{
    font-size:3.4rem;
    flex-shrink:0;
  }
  .basket-slots{
    display:flex;
    gap:10px;
    flex:1;
    flex-wrap:wrap;
  }
  .basket-slot{
    width:64px;height:64px;
    border-radius:16px;
    background:rgba(255,255,255,0.6);
    border:3px dashed #ffb9c9;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2rem;
  }
  .basket-slot.filled{
    border-style:solid;
    background:#fff;
    animation:dropIn .35s ease;
  }
  @keyframes dropIn{
    0%{transform:scale(0) translateY(-40px);opacity:0;}
    70%{transform:scale(1.2);}
    100%{transform:scale(1) translateY(0);opacity:1;}
  }
  .basket-count{
    font-weight:800;
    font-size:1.1rem;
    color:var(--pink-dark);
    white-space:nowrap;
  }

  /* ---------- 결과 화면 ---------- */
  .result-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
  }
  .result-title{
    font-size:2rem;
    font-weight:900;
    color:var(--pink-dark);
  }
  .result-basket-display{
    display:flex;
    gap:14px;
    font-size:3.2rem;
    background:var(--yellow);
    padding:18px 26px;
    border-radius:24px;
    box-shadow:0 8px 0 var(--shadow);
  }

  /* ---------- 하단 피드백 ---------- */
  .feedback-bar{
    width:100%;
    max-width:920px;
    margin-top:16px;
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .feedback-msg{
    font-size:1.25rem;
    font-weight:800;
    padding:14px 28px;
    border-radius:999px;
    background:#fff;
    box-shadow:0 6px 0 var(--shadow);
    transition: all .2s;
    text-align:center;
  }
  .feedback-msg.correct{
    color:#3c8a3c;
    background:var(--green);
  }
  .feedback-msg.gentle{
    color:#b8862e;
    background:var(--yellow);
  }
  .feedback-msg.hidden{
    visibility:hidden;
  }

  .next-btn{
    font-size:1.3rem;
    font-weight:800;
    padding:16px 46px;
    border-radius:999px;
    border:none;
    background:linear-gradient(145deg,var(--pink-dark),#ff7fa0);
    color:#fff;
    box-shadow:0 7px 0 #d9607f;
    cursor:pointer;
    transition: transform .08s;
  }
  .next-btn:active{
    transform:translateY(5px);
    box-shadow:0 2px 0 #d9607f;
  }
  .next-btn.hidden{display:none;}

  .restart-link{
    margin-top:10px;
    font-size:0.95rem;
    color:#a99a8e;
    text-decoration:underline;
    cursor:pointer;
    background:none;
    border:none;
  }

  /* ---------- 별가루 / 폭죽 효과 ---------- */
  #confetti-layer{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    pointer-events:none;
    z-index:999;
    overflow:hidden;
  }
  .confetti-piece{
    position:absolute;
    top:-10px;
    font-size:1.8rem;
    animation: fall linear forwards;
  }
  @keyframes fall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(110vh) rotate(360deg);opacity:0.9;}
  }

  @media (max-width:600px){
    .cards-grid{grid-template-columns:repeat(2,1fr);}
    .fruit-grid{grid-template-columns:repeat(2,1fr);}
    .boxes-row{flex-direction:column;align-items:center;}
    .drop-box{width:100%;max-width:320px;}
    .mission{font-size:1.3rem;}
    .game-card{padding:20px 14px;}
    .header{flex-wrap:wrap; justify-content:center;}
    .stage-badge{font-size:1.05rem; padding:8px 16px;}
    .stage-select-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="stage-badge" id="stageBadge">🛒 시작 전</div>
    <div class="progress-dots" id="progressDots">
      <div class="dot" data-stage="1">1</div>
      <div class="dot" data-stage="2">2</div>
      <div class="dot" data-stage="3">3</div>
      <div class="dot" data-stage="4">4</div>
    </div>
  </div>

  <div class="game-card" id="gameCard">
    <!-- 동적으로 채워짐 -->
  </div>

  <div class="feedback-bar">
    <div class="feedback-msg hidden" id="feedbackMsg"></div>
    <button class="next-btn hidden" id="nextBtn">다음 단계로 ➡️</button>
  </div>

  <button class="restart-link" id="restartLink" style="display:none;">🔄 처음부터 다시하기</button>
</div>

<div id="confetti-layer"></div>

<audio id="audioCorrect" preload="auto"></audio>

<script>
(function(){
  "use strict";

  /* ================= 오디오 (Web Audio API) ================= */
  let audioCtx = null;
  function getCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }
  function playTone(freq, start, duration, type='sine', gainVal=0.18){
    try{
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = gainVal;
      osc.connect(gain);
      gain.connect(ctx.destination);
      const t0 = ctx.currentTime + start;
      osc.start(t0);
      gain.gain.setValueAtTime(gainVal, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
      osc.stop(t0 + duration + 0.02);
    }catch(e){/* 오디오 미지원 환경 대비 */}
  }
  function playCorrectSound(){
    // 딩동댕 느낌의 밝은 3음
    playTone(523.25, 0,    0.18, 'sine', 0.2);
    playTone(659.25, 0.12, 0.18, 'sine', 0.2);
    playTone(783.99, 0.24, 0.28, 'sine', 0.22);
  }
  function playGentleSound(){
    // 부드러운 안내음 (부정적이지 않게)
    playTone(392.0, 0, 0.16, 'sine', 0.12);
    playTone(349.23, 0.13, 0.22, 'sine', 0.1);
  }
  function playPopSound(){
    playTone(880, 0, 0.08, 'triangle', 0.15);
  }
  function playFinaleSound(){
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
      playTone(f, i*0.13, 0.3, 'sine', 0.2);
    });
  }

  /* ================= 데이터 ================= */
  const stage1Items = [
    {emoji:'🍎', name:'사과', type:'food'},
    {emoji:'🪥', name:'칫솔', type:'object'},
    {emoji:'🍌', name:'바나나', type:'food'},
    {emoji:'⏰', name:'시계', type:'object'},
    {emoji:'🍞', name:'빵', type:'object_food'}, // 빵은 food
    {emoji:'☂️', name:'우산', type:'object'}
  ];
  // 위 type 표기 정리: 빵은 food로 통일
  stage1Items.forEach(it=>{ if(it.type==='object_food') it.type='food'; });

  const stage2Pool = [
    {emoji:'🍓', name:'딸기', cat:'fruit'},
    {emoji:'🍉', name:'수박', cat:'fruit'},
    {emoji:'🍇', name:'포도', cat:'fruit'},
    {emoji:'🥕', name:'당근', cat:'veg'},
    {emoji:'🥦', name:'브로콜리', cat:'veg'},
    {emoji:'🥒', name:'오이', cat:'veg'}
  ];

  const stage3Pool = [
    {emoji:'🍎', name:'사과'},
    {emoji:'🍌', name:'바나나'},
    {emoji:'🍇', name:'포도'},
    {emoji:'🍉', name:'수박'},
    {emoji:'🍓', name:'딸기'},
    {emoji:'🍊', name:'오렌지'},
    {emoji:'🍑', name:'복숭아'},
    {emoji:'🍍', name:'파인애플'}
  ];

  /* ================= 상태 ================= */
  let state = {
    stage: 0, // 0 = 인트로
    stage1Index: 0,
    stage1Order: [],
    stage2Mission: 'fruit',
    stage2Selected: new Set(),
    stage2Checked: false,
    stage3Mission: 'veg',
    stage3Selected: new Set(),
    stage3Checked: false,
    stage4Basket: []
  };

  const gameCard = document.getElementById('gameCard');
  const stageBadge = document.getElementById('stageBadge');
  const feedbackMsg = document.getElementById('feedbackMsg');
  const nextBtn = document.getElementById('nextBtn');
  const restartLink = document.getElementById('restartLink');
  const dots = document.querySelectorAll('.dot');

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function updateDots(){
    dots.forEach(d=>{
      const s = parseInt(d.dataset.stage,10);
      d.classList.remove('active','done');
      if(s < state.stage) d.classList.add('done');
      else if(s === state.stage) d.classList.add('active');
    });
  }

  dots.forEach(d=>{
    d.addEventListener('click', ()=>{
      const s = parseInt(d.dataset.stage,10);
      getCtx();
      goToStage(s);
    });
  });

  function setFeedback(text, kind){
    feedbackMsg.textContent = text;
    feedbackMsg.className = 'feedback-msg' + (kind ? ' '+kind : '');
  }
  function clearFeedback(){
    feedbackMsg.textContent = '';
    feedbackMsg.className = 'feedback-msg hidden';
  }
  function showNextBtn(label){
    nextBtn.textContent = label || '다음 단계로 ➡️';
    nextBtn.classList.remove('hidden');
  }
  function hideNextBtn(){
    nextBtn.classList.add('hidden');
  }

  /* ================= 폭죽 / 별가루 효과 ================= */
  function burstConfetti(cx, cy){
    const layer = document.getElementById('confetti-layer');
    const emojis = ['✨','⭐','🎉','🌟','💛','🎊'];
    const count = 18;
    for(let i=0;i<count;i++){
      const span = document.createElement('span');
      span.className = 'confetti-piece';
      span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const startX = (cx!==undefined ? cx : window.innerWidth/2) + (Math.random()*200-100);
      span.style.left = startX + 'px';
      span.style.top = (cy!==undefined? cy : window.innerHeight/2) + 'px';
      const dur = 1.1 + Math.random()*0.8;
      span.style.animationDuration = dur+'s';
      span.style.fontSize = (1.2 + Math.random()*1.4)+'rem';
      layer.appendChild(span);
      setTimeout(()=>span.remove(), dur*1000+100);
    }
  }
  function fullScreenConfetti(){
    for(let i=0;i<3;i++){
      setTimeout(()=>{
        burstConfetti(Math.random()*window.innerWidth, -10);
      }, i*150);
    }
  }

  /* ================= 인트로 화면 ================= */
  const stageMeta = [
    { num:1, emoji:'🍎🪥', title:'1단계', desc:'음식과 물건 분류하기' },
    { num:2, emoji:'🍓',   title:'2단계', desc:'과일 고르기' },
    { num:3, emoji:'🥦',   title:'3단계', desc:'야채 고르기' },
    { num:4, emoji:'🧺',   title:'4단계', desc:'좋아하는 과일 담기' }
  ];

  function renderIntro(){
    stageBadge.textContent = '🛒 마트 분류 놀이';
    clearFeedback();
    hideNextBtn();
    restartLink.style.display = 'none';
    updateDots();

    const cardsHtml = stageMeta.map(s=>`
      <div class="stage-select-card" data-stage="${s.num}" id="stageSelect${s.num}">
        <div class="stage-select-emoji">${s.emoji}</div>
        <div class="stage-select-title">${s.title}</div>
        <div class="stage-select-desc">${s.desc}</div>
      </div>
    `).join('');

    gameCard.innerHTML = `
      <div class="intro-wrap">
        <div class="intro-emoji">🛍️</div>
        <div class="intro-title">마트 분류 놀이에 놀러 왔어요!</div>
        <div class="intro-desc">
          하고 싶은 단계를 골라서 눌러보세요!<br>
          순서는 상관없어요. 마음대로 골라도 괜찮아요 😊
        </div>
        <div class="stage-select-grid">${cardsHtml}</div>
      </div>
    `;

    stageMeta.forEach(s=>{
      document.getElementById('stageSelect'+s.num).addEventListener('click', ()=>{
        getCtx(); // 사용자 클릭으로 오디오 컨텍스트 활성화
        goToStage(s.num);
      });
    });
  }

  /* ================= 단계 전환 ================= */
  function goToStage(n){
    state.stage = n;
    updateDots();
    clearFeedback();
    hideNextBtn();
    restartLink.style.display = (n>0)?'block':'none';
    gameCard.style.opacity = 0;
    setTimeout(()=>{
      if(n===0) renderIntro();
      if(n===1) renderStage1();
      if(n===2) renderStage2();
      if(n===3) renderStage3();
      if(n===4) renderStage4();
      if(n===5) renderResult();
      gameCard.style.transition = 'opacity .35s';
      gameCard.style.opacity = 1;
    }, 180);
  }

  /* ================= 1단계: 음식 / 물건 분류 ================= */
  function renderStage1(){
    stageBadge.textContent = '1단계 · 음식과 물건 분류하기';
    state.stage1Order = shuffle(stage1Items);
    state.stage1Index = 0;
    drawStage1();
  }

  function drawStage1(){
    const total = state.stage1Order.length;
    const idx = state.stage1Index;

    if(idx >= total){
      // 1단계 완료
      setFeedback('잘했어요! 모든 물건을 다 분류했어요 🎉', 'correct');
      showNextBtn('2단계로 가기 ➡️');
      nextBtn.onclick = ()=> goToStage(2);
      gameCard.innerHTML = `
        <div class="mission">1단계 완료!</div>
        <div class="intro-wrap">
          <div class="intro-emoji">🎊</div>
          <div class="intro-desc">먹을 수 있는 음식과 사용하는 물건을 모두 잘 구분했어요!</div>
        </div>
      `;
      fullScreenConfetti();
      playFinaleSound();
      return;
    }

    const item = state.stage1Order[idx];

    gameCard.innerHTML = `
      <div class="mission">알맞은 상자에 넣어주세요!</div>
      <div class="sub-mission">아이템을 손가락이나 마우스로 끌어서 옮겨보세요</div>
      <div class="stage1-area">
        <div class="item-counter">${idx+1} / ${total}</div>
        <div class="current-item-zone">
          <div class="current-item" id="currentItem" draggable="true">${item.emoji}</div>
        </div>
        <div class="boxes-row">
          <div class="drop-box food" id="boxFood" data-type="food">
            <div class="box-emoji">🍽️</div>
            <div>먹을 수 있는 음식</div>
          </div>
          <div class="drop-box object" id="boxObject" data-type="object">
            <div class="box-emoji">🧰</div>
            <div>사용하는 물건</div>
          </div>
        </div>
      </div>
    `;

    setupDragForCurrentItem(item);
  }

  function setupDragForCurrentItem(item){
    const el = document.getElementById('currentItem');
    const boxFood = document.getElementById('boxFood');
    const boxObject = document.getElementById('boxObject');
    let dragging = false;
    let offsetX=0, offsetY=0;
    let startX=0, startY=0;

    function getPoint(e){
      if(e.touches && e.touches[0]) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
      return {x:e.clientX, y:e.clientY};
    }

    function onDown(e){
      dragging = true;
      el.classList.add('dragging');
      const p = getPoint(e);
      startX = p.x; startY = p.y;
      const rect = el.getBoundingClientRect();
      offsetX = p.x - rect.left;
      offsetY = p.y - rect.top;
      el.style.position='fixed';
      el.style.left = rect.left+'px';
      el.style.top = rect.top+'px';
      el.style.margin = 0;
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend', onUp);
      e.preventDefault();
    }
    function onMove(e){
      if(!dragging) return;
      const p = getPoint(e);
      el.style.left = (p.x - offsetX)+'px';
      el.style.top = (p.y - offsetY)+'px';
      checkHover(p);
      e.preventDefault();
    }
    function checkHover(p){
      [boxFood, boxObject].forEach(box=>{
        const r = box.getBoundingClientRect();
        const inside = p.x>=r.left && p.x<=r.right && p.y>=r.top && p.y<=r.bottom;
        box.classList.toggle('hover-active', inside);
      });
    }
    function onUp(e){
      if(!dragging) return;
      dragging = false;
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);

      const p = (e.changedTouches && e.changedTouches[0])
        ? {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY}
        : {x:e.clientX, y:e.clientY};

      let dropped = null;
      [boxFood, boxObject].forEach(box=>{
        const r = box.getBoundingClientRect();
        if(p.x>=r.left && p.x<=r.right && p.y>=r.top && p.y<=r.bottom){
          dropped = box;
        }
        box.classList.remove('hover-active');
      });

      if(dropped){
        handleDrop(dropped.dataset.type, item, el);
      } else {
        resetItemPosition(el);
      }
    }

    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', onDown, {passive:false});

    // 클릭만으로도 분류 가능하게 (보조 조작 방식: 상자 클릭 시 현재 아이템 이동)
    boxFood.onclick = ()=>{ if(!dragging) handleDrop('food', item, el); };
    boxObject.onclick = ()=>{ if(!dragging) handleDrop('object', item, el); };
  }

  function resetItemPosition(el){
    el.style.position='';
    el.style.left='';
    el.style.top='';
    el.style.margin='';
  }

  function handleDrop(targetType, item, el){
    const isCorrect = (item.type === targetType);
    if(isCorrect){
      playCorrectSound();
      el.classList.add('popped');
      const rect = el.getBoundingClientRect();
      burstConfetti(rect.left+rect.width/2, rect.top+rect.height/2);
      setFeedback(`정답이에요! "${item.name}"은 ${targetType==='food'?'먹을 수 있는 음식':'사용하는 물건'}이 맞아요 👍`, 'correct');
      setTimeout(()=>{
        clearFeedback();
        state.stage1Index += 1;
        drawStage1();
      }, 850);
    }else{
      playGentleSound();
      const targetBox = (targetType==='food') ? document.getElementById('boxFood') : document.getElementById('boxObject');
      targetBox.classList.add('wrong-shake');
      setTimeout(()=>targetBox.classList.remove('wrong-shake'), 420);
      resetItemPosition(el);
      setFeedback(`다시 한 번 생각해볼까요? "${item.name}"은 다른 상자에 들어가요 😊`, 'gentle');
      setTimeout(clearFeedback, 1600);
    }
  }

  /* ================= 2단계: 과일 고르기 / 3단계: 야채 고르기 (공용 로직) ================= */
  function renderStage2(){
    stageBadge.textContent = '2단계 · 과일 고르기';
    state.stage2Mission = 'fruit';
    state.stage2Selected = new Set();
    state.stage2Checked = false;
    drawCardPickStage(2);
  }

  function renderStage3(){
    stageBadge.textContent = '3단계 · 야채 고르기';
    state.stage3Mission = 'veg';
    state.stage3Selected = new Set();
    state.stage3Checked = false;
    drawCardPickStage(3);
  }

  function drawCardPickStage(stageNum){
    const missionKey = (stageNum===2) ? 'stage2Mission' : 'stage3Mission';
    const mission = state[missionKey];
    const missionText = mission === 'veg'
      ? '🥦 야채를 모두 골라보세요!'
      : '🍓 과일을 모두 골라보세요!';

    const cardsHtml = stage2Pool.map((item, i)=>`
      <div class="pick-card" data-idx="${i}" id="pickCard${i}">
        <div class="card-emoji">${item.emoji}</div>
        <div>${item.name}</div>
      </div>
    `).join('');

    gameCard.innerHTML = `
      <div class="mission">${missionText}</div>
      <div class="sub-mission">맞는 카드를 모두 골라서 클릭한 뒤, 확인 버튼을 눌러주세요</div>
      <div class="cards-grid">${cardsHtml}</div>
      <button class="check-btn" id="checkBtn">확인할게요 ✔️</button>
    `;

    const selectedKey = (stageNum===2) ? 'stage2Selected' : 'stage3Selected';
    const checkedKey = (stageNum===2) ? 'stage2Checked' : 'stage3Checked';

    stage2Pool.forEach((item,i)=>{
      const cardEl = document.getElementById('pickCard'+i);
      cardEl.addEventListener('click', ()=>{
        if(state[checkedKey]) return;
        if(state[selectedKey].has(i)){
          state[selectedKey].delete(i);
          cardEl.classList.remove('selected');
        }else{
          state[selectedKey].add(i);
          cardEl.classList.add('selected');
          playPopSound();
        }
      });
    });

    document.getElementById('checkBtn').addEventListener('click', ()=>checkCardPickStage(stageNum));
  }

  function checkCardPickStage(stageNum){
    const missionKey = (stageNum===2) ? 'stage2Mission' : 'stage3Mission';
    const selectedKey = (stageNum===2) ? 'stage2Selected' : 'stage3Selected';
    const checkedKey = (stageNum===2) ? 'stage2Checked' : 'stage3Checked';
    const mission = state[missionKey];

    if(state[checkedKey]) return;

    const correctIdxs = stage2Pool
      .map((item,i)=> item.cat===mission ? i : -1)
      .filter(i=>i>=0);
    const correctSet = new Set(correctIdxs);

    const selected = state[selectedKey];
    let allCorrect = selected.size === correctSet.size;
    if(allCorrect){
      for(const i of selected){ if(!correctSet.has(i)){ allCorrect=false; break; } }
    }

    if(allCorrect){
      state[checkedKey] = true;
      stage2Pool.forEach((item,i)=>{
        const cardEl = document.getElementById('pickCard'+i);
        if(correctSet.has(i)){
          cardEl.classList.add('correct-flash');
        }
        cardEl.classList.add('locked');
      });
      document.getElementById('checkBtn').disabled = true;
      playCorrectSound();
      fullScreenConfetti();
      setFeedback('정확해요! 모두 잘 골랐어요 🎉', 'correct');
      const nextStageNum = stageNum + 1;
      showNextBtn(nextStageNum + '단계로 가기 ➡️');
      nextBtn.onclick = ()=> goToStage(nextStageNum);
    }else{
      playGentleSound();
      // 틀린 카드와 빠뜨린 카드에 부드러운 힌트
      stage2Pool.forEach((item,i)=>{
        const cardEl = document.getElementById('pickCard'+i);
        const isSelected = selected.has(i);
        const shouldBeSelected = correctSet.has(i);
        if(isSelected && !shouldBeSelected){
          cardEl.classList.add('wrong-flash');
          setTimeout(()=>cardEl.classList.remove('wrong-flash'), 500);
        }
      });
      setFeedback('다시 한 번 찾아볼까요? 힌트: ' + (mission==='veg' ? '땅에서 자라는 채소예요 🌱' : '달콤한 과일이에요 🍯'), 'gentle');
      setTimeout(clearFeedback, 2200);
    }
  }

  /* ================= 4단계: 좋아하는 과일 담기 ================= */
  function renderStage4(){
    stageBadge.textContent = '4단계 · 내가 좋아하는 과일 담기';
    state.stage4Basket = [];
    state.stage4Pool = shuffle(stage3Pool).slice(0,8);
    drawStage4();
  }

  function drawStage4(){
    const need = 3;
    const have = state.stage4Basket.length;

    const cardsHtml = state.stage4Pool.map((item,i)=>{
      const used = state.stage4Basket.some(b=>b.idx===i);
      return `
        <div class="fruit-card ${used?'in-basket':''}" data-idx="${i}" id="fruitCard${i}">
          <div class="fruit-emoji">${item.emoji}</div>
          <div>${item.name}</div>
        </div>
      `;
    }).join('');

    const slotsHtml = Array.from({length:need}).map((_,i)=>{
      const b = state.stage4Basket[i];
      return `<div class="basket-slot ${b?'filled':''}">${b ? b.emoji : ''}</div>`;
    }).join('');

    gameCard.innerHTML = `
      <div class="mission">🧺 내가 좋아하는 과일을 마트 바구니에 담아보세요!</div>
      <div class="sub-mission">과일 ${need}개를 골라서 클릭해보세요 (${have}/${need})</div>
      <div class="stage3-wrap">
        <div class="fruit-grid">${cardsHtml}</div>
        <div class="basket-zone">
          <div class="basket-icon">🧺</div>
          <div class="basket-slots">${slotsHtml}</div>
          <div class="basket-count">${have} / ${need}</div>
        </div>
      </div>
    `;

    state.stage4Pool.forEach((item,i)=>{
      const cardEl = document.getElementById('fruitCard'+i);
      const used = state.stage4Basket.some(b=>b.idx===i);
      if(used) return;
      cardEl.addEventListener('click', ()=>{
        if(state.stage4Basket.length >= need) return;
        state.stage4Basket.push({idx:i, emoji:item.emoji, name:item.name});
        playPopSound();
        drawStage4();
        if(state.stage4Basket.length === need){
          setTimeout(()=>{
            playCorrectSound();
            fullScreenConfetti();
            setFeedback('나만의 과일 바구니 완성! 🧺✨', 'correct');
            showNextBtn('결과 보러가기 ➡️');
            nextBtn.onclick = ()=> goToStage(5);
          }, 400);
        }
      });
    });
  }

  /* ================= 결과 화면 ================= */
  function renderResult(){
    stageBadge.textContent = '🎉 완성!';
    hideNextBtn();
    const basketHtml = state.stage4Basket.map(b=>`<span>${b.emoji}</span>`).join('');
    const names = state.stage4Basket.map(b=>b.name).join(', ');

    gameCard.innerHTML = `
      <div class="result-wrap">
        <div class="intro-emoji">🏆</div>
        <div class="result-title">나만의 과일 바구니 완성!</div>
        <div class="result-basket-display">${basketHtml}</div>
        <div class="intro-desc">${names}을 담았어요! 모든 놀이를 다 끝냈어요. 정말 멋져요! 👏</div>
      </div>
    `;
    playFinaleSound();
    fullScreenConfetti();
    setTimeout(fullScreenConfetti, 500);
  }

  restartLink.addEventListener('click', ()=>{
    state = {
      stage:0, stage1Index:0, stage1Order:[],
      stage2Mission:'fruit', stage2Selected:new Set(), stage2Checked:false,
      stage3Mission:'veg', stage3Selected:new Set(), stage3Checked:false,
      stage4Basket:[]
    };
    renderIntro();
  });

  /* ================= 초기화 ================= */
  renderIntro();

})();
</script>
</body>
